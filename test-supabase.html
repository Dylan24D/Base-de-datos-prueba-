<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Supabase</title>
    <!-- Usar versión específica y diferente URL -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.3/dist/umd/supabase.js"></script>
</head>
<body>
    <h1>Test de Conexión a Supabase</h1>
    <div id="status">Conectando...</div>
    <div id="resultado"></div>

    <script>
        // TUS DATOS REALES
        const SUPABASE_URL = "https://iuemugmiuxzqwwhlbtcn.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1ZW11Z21pdXh6cXd3aGxidGNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDk1MzAsImV4cCI6MjA5MjI4NTUzMH0.mONcS-nszajACwOXdnUJotVJBvn69wfVkrEtUtR0Y_s";
        
        setTimeout(async () => {
            const statusDiv = document.getElementById('status');
            const resultadoDiv = document.getElementById('resultado');
            
            if (!window.supabase) {
                statusDiv.innerHTML = "❌ Librería no cargada - Probando método alternativo...";
                // Intentar cargar con script dinámico
                const script = document.createElement('script');
                script.src = "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase-js.js";
                script.onload = () => {
                    setTimeout(() => {
                        if (window.supabase) {
                            statusDiv.innerHTML = "✅ Cargado con unpkg";
                            conectar();
                        }
                    }, 500);
                };
                document.head.appendChild(script);
                return;
            }
            
            async function conectar() {
                const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await dbClient.from('semanas').select('*');
                
                if (error) {
                    statusDiv.innerHTML = "❌ Error";
                    resultadoDiv.innerHTML = error.message;
                } else {
                    statusDiv.innerHTML = "✅ CONEXIÓN EXITOSA";
                    resultadoDiv.innerHTML = `Datos: ${JSON.stringify(data)}`;
                }
            }
            
            conectar();
        }, 1000);
    </script>
</body>
</html>
