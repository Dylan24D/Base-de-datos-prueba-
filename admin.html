<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Dylan Chanco</title>

    <!-- 1. LIBRERÍA SUPABASE (Local para evitar bloqueos de red) -->
    <script src="supabase.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="gengar-fog">
    <!-- Capa de Animación Propia: Partículas Espectrales -->
    <div class="spectral-stream">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="mouse-aura"></div>

    <!-- MINI VENTANA DE NOTIFICACIÓN (TOAST) -->
    <div id="toast-admin" class="toast-notification"></div>

    <nav class="navbar">
        <div class="logo nav-item-electric">
            <div class="nav-item-inner" style="padding: 5px 10px; display: flex; align-items: center; gap: 10px;">
                <img src="assets/logo_upla_sin_fondo.png" alt="Logo" style="height: 30px; width: auto; border-radius: 4px; border: 1px solid var(--accent);">
                ADMIN<span>PANEL</span>
            </div>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="theme-selector-container">
                <button onclick="toggleThemeMenu()" class="theme-toggle-circle" title="Seleccionar Tema">
                    <img id="theme-icon" src="assets/siniestroo.png" alt="Tema">
                </button>
                <div id="theme-menu" class="theme-options">
                    <button class="theme-btn-option theme-btn-darkrai" onclick="setTheme('darkrai')">
                        <img src="assets/siniestroo.png" alt="Darkrai"> Darkrai
                    </button>
                    <button class="theme-btn-option theme-btn-charizard" onclick="setTheme('charizard')">
                        <img src="assets/fuegoo.png" alt="Charizard"> Charizard
                    </button>
                    <button class="theme-btn-option theme-btn-greninja" onclick="setTheme('greninja')">
                        <img src="assets/aguaaa.png" alt="Greninja"> Greninja
                    </button>
                    <button class="theme-btn-option theme-btn-sceptile" onclick="setTheme('sceptile')">
                        <img src="assets/plantaa.png" alt="Sceptile"> Sceptile
                    </button>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="btn-admin-electric" style="border-color: #ef4444; color: #ef4444;">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <div class="container">
        <h2 class="titulo-arquitectura" style="font-size: 2.5rem; margin-bottom: 20px;">Gestión de Semanas</h2>

        <!-- FORMULARIO DE CARGA -->
        <div class="electric-border-container" style="margin-bottom: 40px;">
            <div class="electric-border-inner" style="padding: 30px;">
                <h3 style="margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">Sincronizar Material</h3>
                <div class="upload-grid-admin" style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end;">
                    
                    <div class="input-group" style="flex: 1; min-width: 150px;">
                        <label>Elegir Semana</label>
                        <select id="semana-select">
                            <option value="1">Semana 01</option><option value="2">Semana 02</option>
                            <option value="3">Semana 03</option><option value="4">Semana 04</option>
                            <option value="5">Semana 05</option><option value="6">Semana 06</option>
                            <option value="7">Semana 07</option><option value="8">Semana 08</option>
                            <option value="9">Semana 09</option><option value="10">Semana 10</option>
                            <option value="11">Semana 11</option><option value="12">Semana 12</option>
                            <option value="13">Semana 13</option><option value="14">Semana 14</option>
                            <option value="15">Semana 15</option><option value="16">Semana 16</option>
                        </select>
                    </div>
                    
                    <div class="input-group" style="flex: 2; min-width: 200px;">
                        <label>Agregar Fondo al Trabajo (Imagen)</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="img-input" class="file-input-custom" accept="image/*">
                            <div class="file-dummy"><span class="icon">🖼️</span><span class="text">Seleccionar Fondo</span></div>
                        </div>
                    </div>

                    <div class="input-group" style="flex: 2; min-width: 200px;">
                        <label>Agregar Archivos del Trabajo (PDF, Imágenes, etc.)</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="pdf-input" class="file-input-custom" multiple>
                            <div class="file-dummy"><span class="icon">📁</span><span class="text">Subir uno o varios archivos</span></div>
                        </div>
                    </div>

                    <button class="btn-admin-panel" onclick="guardarCambios()">GUARDAR</button>
                </div>
            </div>
        </div>

        <!-- SECCIONES DE UNIDADES (ACORDEÓN) -->
        <div id="unidades-admin" class="grid-unidades">
            <div class="unidad-wrapper">
                <div class="electric-border-container" onclick="toggleUnidad(1)" style="cursor: pointer;">
                    <div class="electric-border-inner" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="titulo-arquitectura" style="font-size: 1.5rem; margin: 0;">UNIDAD 01</h2>
                        <span id="icon-1" style="color: var(--gengar-eyes); font-size: 1.8rem; transition: 0.3s;">+</span>
                    </div>
                </div>
                <div id="content-1" style="display: none; padding-top: 20px;"><div class="grid-4x4" id="admin-u1"></div></div>
            </div>

            <div class="unidad-wrapper">
                <div class="electric-border-container" onclick="toggleUnidad(2)" style="cursor: pointer;">
                    <div class="electric-border-inner" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="titulo-arquitectura" style="font-size: 1.5rem; margin: 0;">UNIDAD 02</h2>
                        <span id="icon-2" style="color: var(--gengar-eyes); font-size: 1.8rem; transition: 0.3s;">+</span>
                    </div>
                </div>
                <div id="content-2" style="display: none; padding-top: 20px;"><div class="grid-4x4" id="admin-u2"></div></div>
            </div>

            <div class="unidad-wrapper">
                <div class="electric-border-container" onclick="toggleUnidad(3)" style="cursor: pointer;">
                    <div class="electric-border-inner" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="titulo-arquitectura" style="font-size: 1.5rem; margin: 0;">UNIDAD 03</h2>
                        <span id="icon-3" style="color: var(--gengar-eyes); font-size: 1.8rem; transition: 0.3s;">+</span>
                    </div>
                </div>
                <div id="content-3" style="display: none; padding-top: 20px;"><div class="grid-4x4" id="admin-u3"></div></div>
            </div>

            <div class="unidad-wrapper">
                <div class="electric-border-container" onclick="toggleUnidad(4)" style="cursor: pointer;">
                    <div class="electric-border-inner" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="titulo-arquitectura" style="font-size: 1.5rem; margin: 0;">UNIDAD 04</h2>
                        <span id="icon-4" style="color: var(--gengar-eyes); font-size: 1.8rem; transition: 0.3s;">+</span>
                    </div>
                </div>
                <div id="content-4" style="display: none; padding-top: 20px;"><div class="grid-4x4" id="admin-u4"></div></div>
            </div>
        </div>
    </div>

    <!-- MODAL LISTA DE ARCHIVOS (PARA VISTA PREVIA EN ADMIN) -->
    <div id="modal-lista-archivos" class="modal-overlay" onclick="cerrarModalMateriales(event)">
        <div class="modal-content" style="max-width: 600px; width: 90%;">
            <button class="btn-close" onclick="cerrarModalMateriales(event)">×</button>
            <div class="hero-header-centered">
                <h2 id="modal-archivos-titulo" class="titulo-arquitectura" style="font-size: 2.5rem; margin-bottom: 20px;">ARCHIVOS</h2>
            </div>
            <div id="lista-archivos-content" class="archivos-lista-grid"></div>
        </div>
    </div>

    <!-- MINI VENTANA PARA PDF (ADMIN) -->
    <div id="modal-pdf" class="modal-overlay" onclick="cerrarVisualizadorPDF(event)">
        <div class="modal-content" style="max-width: 1000px; width: 95%;">
            <button class="btn-close" onclick="cerrarVisualizadorPDF(event)">×</button>
            <div class="hero-header-centered">
                <h2 id="pdf-modal-titulo" class="titulo-arquitectura" style="font-size: 2.2rem; margin-bottom: 20px;">VISTA PREVIA</h2>
            </div>
            <div class="pdf-viewer-container">
                <iframe id="pdf-viewer-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL (Debe ir después del HTML) -->
    <script src="script.js"></script>
</body>
</html>
