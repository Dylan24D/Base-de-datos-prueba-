<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Dylan Chanco</title>

    <!-- LIBRERÍA SUPABASE (CORREGIDA: Enlace completo para que el login funcione) -->
    <!-- En todos tus HTML, antes de cualquier otro script -->
    <script src="supabase.js"></script>



    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body gengar-fog">
    <!-- Capa de Animación Propia: Partículas Espectrales -->
    <div class="spectral-stream">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Capa para el aura del mouse -->
    <div class="mouse-aura"></div>

    <!-- Contenedor con Borde Eléctrico Gengar -->
    <div class="electric-border-container float-gengar" style="padding: 2px; z-index: 100;">
        <div class="electric-border-inner login-card" style="padding: 40px;">
            <h2>Acceso Admin</h2>
            <p>Introduce tus credenciales para gestionar el material</p>

            <div class="input-group">
                <label for="user">Admin ID</label>
                <input type="text" id="user" placeholder="Usuario: Dyzin24" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="pass">Código de Seguridad</label>
                <input type="password" id="pass" placeholder="Clave: 12345">
            </div>

            <!-- Botón con efecto eléctrico -->
            <div class="btn-electric-wrapper" style="width: 100%; margin-top: 10px;">
                <!-- Añadido type="button" para evitar recargas accidentales -->
                <button type="button" onclick="validarAcceso()" class="btn-admin-panel" id="btn-login-final">
                    Ingresar al Panel
                </button>
            </div>

            <p style="margin-top: 25px; text-align: center;">
                <a href="index.html" class="btn-back-home">
                    <span>←</span> Volver al inicio
                </a>
            </p>
        </div>
    </div>

    <!-- Gengar asomando en la esquina -->
    <div class="gengar-sprite float-gengar" style="pointer-events: none;">
        <img src="assets/gengar.jpg" alt="Gengar" onerror="this.style.display='none'">
    </div>

    <!-- Vinculación del script con la lógica de validación -->
    <script src="script.js"></script>
</body>

</html>
